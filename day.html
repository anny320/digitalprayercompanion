/* ── Render day ─────────────────────────────────────── */
function renderDay(num) {
  const d    = DAY_DATA[num];
  const prev = num > 1  ? `<a href="day.html?day=${num-1}" class="btn btn--outline" style="color:var(--purple);border-color:var(--purple)">← Day ${num-1}</a>` : '<span></span>';
  const next = num < 21 ? `<a href="day.html?day=${num+1}" class="btn btn--primary">Day ${num+1} →</a>` : `<a href="journey.html" class="btn btn--primary">Complete Journey 🎉</a>`;

  document.title = `Day ${num}: ${d.title} — Digital Prayer Companion`;

  return `
    <div class="day-hero">
      <div class="container">
        <span class="day-num-badge">Day ${num} of 21</span>
        <h1>${d.emoji} ${d.title}</h1>
        <p class="scripture-ref">${d.verseRef}</p>
      </div>
    </div>

    <div class="day-content">
      <p style="color:var(--gold);font-weight:700;font-size:.88rem;letter-spacing:.08em;text-transform:uppercase;margin-bottom:.5rem">Today's Theme</p>
      <p style="font-family:var(--font-serif);font-size:1.12rem;color:var(--purple);font-style:italic;line-height:1.7">${d.theme}</p>

      <div class="scripture-block">
        "${d.verse}"
        <cite>— ${d.verseRef}</cite>
      </div>

      <div class="reflection-section">
        <h3>Reflection</h3>
        <p>${d.reflection}</p>
      </div>

      <div class="reflection-section">
        <h3>Prayer Prompts</h3>
        <ul class="prayer-prompts">
          ${d.prompts.map(p => `<li>${p}</li>`).join('')}
        </ul>
      </div>

      <div class="reflection-section">
        <h3>📝 Your Journal</h3>
        <p style="font-size:.9rem;color:var(--muted);margin-bottom:.75rem">This is your private space. Notes save automatically to your device only — never shared.</p>
        <textarea class="journal-area" data-key="journal_day_${num}" placeholder="Write your thoughts, prayers, and reflections here…"></textarea>
        <p class="journal-hint">🔒 Saved locally on your device only</p>
      </div>

      <div class="reflection-section">
        <h3>Today's Prayer</h3>
        <div class="scripture-block" style="font-style:normal;font-size:.98rem;line-height:1.8;color:#333">
          ${d.prayer}
        </div>
      </div>

      <div class="declaration-box">
        <h4>🗣️ Speak This Declaration</h4>
        <p>${d.declaration}</p>
      </div>

      ${d.fasting ? `
      <div style="background:#fff8e8;border:1px solid rgba(201,151,58,.3);border-radius:var(--radius-sm);padding:1.25rem 1.5rem;margin:1.5rem 0">
        <p style="font-size:.85rem;font-weight:700;color:var(--gold);margin-bottom:.3rem;letter-spacing:.05em;text-transform:uppercase">✦ Fasting Focus</p>
        <p style="font-size:.95rem;color:#555">${d.fasting}</p>
      </div>` : ''}

      <button class="complete-btn" data-day="${num}">Mark Day ${num} Complete</button>

      <div class="day-nav">
        ${prev}
        <button class="btn" style="background:none;color:var(--muted);border:1px solid rgba(0,0,0,.1)" onclick="shareDay(${num},'${d.title.replace(/'/g,"\\'")}')">
          Share Day ${num} ↗
        </button>
        ${next}
      </div>
    </div>`;
}

const params  = new URLSearchParams(window.location.search);
const dayNum  = Math.min(21, Math.max(1, parseInt(params.get('day')) || 1));
const appEl   = document.getElementById('day-app');
appEl.innerHTML = renderDay(dayNum);

document.addEventListener('DOMContentLoaded', () => {
  initJournal();
  initCompleteBtn();
  initMobileNav();
});
</script>
</body>
</html>
